{% load static %}

<body style="margin: 0; padding: 0; background-color: #eee !important;">
    <nav class="navbar">
        <div class="row nav-bar-1"
            style="display: flex; justify-content: space-between; align-items: center;  height: 100%; padding: 0 50px; max-height: none !important;">
            <div class="col home">
                <img src="{% static '/IMG/logoMedicalBlanco.png' %}"
                    style="width: 75px; margin-right: 20px; border-right: 3px solid white; padding-right: 20px;"
                    alt="logo">
                <p style="color: white;font-weight: 600; font-size: 36px;font-family: sans-serif;"> CLINIREPORT</p>
                <span class="tooltip-text">Inicio</span>
            </div>
            <div class="col home">
                <h3 style="margin-right: 20px; color: #FFFFFF;">{{Username}} | {{SedeSeleccionada}}</h3>

                    <span class="tooltip-text">Salir</span>
                </a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div style="display: flex; align-items: center; justify-content: center; height: 100%;"
                class="row col-md-8 align-items-center">
                <div class="card">
                    {% for grupos in Grupos %}
                    <a href="/pantallaSubgrupos/{{Username}}, {{SedeSeleccionada}}, {{grupos.id}} "
                        style="margin: 20px;" class="image-link">
                        <img style="width:100%" src="{% static grupos.logo %}" class="btn-outline-primary">
                    </a>
                    {% endfor %}
                    <!--    <img src="../assets/imagenes/image 3.png"> -->

                    </div> -->
                </div>
                <!-- <div style="display: flex; align-items: center; justify-content: center;"  class="row col-md-8 align-items-center">  -->

            </div>
        </div>
    </div>
</body>
